<!DOCTYPE html>
<html lang="en">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Root font-size bump — every other size is in rem, so this scales the
     whole site proportionally. Default is 16px; tune this single value to
     scale up or down. */
  html { font-size: 17.5px; }

  :root {
    --bg: #121a0e;
    --text: #c0b890;
    --text-bright: #e0dcc0;
    --text-muted: #908868;
    --text-subtitle: #9aac80;
    --text-inscription: #8a9e70;
    --text-section: #8a7a55;

    --shire-border:   #4a7a3a;  --shire-text:   #8cc07a;
    --hearth-border:  #8a7030;  --hearth-text:  #d4b060;
    --evenstar-border:#4a7878;  --evenstar-text:#80b8b0;
    --earthen-border: #7a5a30;  --earthen-text: #c8a068;
    --shadow-border:  #6a3028;  --shadow-text:  #c07060;
    --twilight-border:#5a4a70;  --twilight-text:#a898c0;

    --card-bg: rgba(20, 28, 16, 0.65);
  }

  body {
    background: #121a0e;
    color: var(--text);
    font-family: 'Crimson Text', serif;
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.55;
  }

  a { color: var(--evenstar-text); text-decoration: none; border-bottom: 1px dotted rgba(128,184,176,0.3); }
  a:hover { color: var(--text-bright); border-bottom-color: var(--evenstar-text); }

  /* --- FIREFLY CANVAS --- */
  canvas#fireflies {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }

  /* --- VINE EDGE --- */
  .vine-edge {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(90,128,56,0.3) 15%,
      rgba(90,128,56,0.6) 30%,
      rgba(140,192,122,0.4) 50%,
      rgba(90,128,56,0.6) 70%,
      rgba(90,128,56,0.3) 85%,
      transparent 100%);
    z-index: 100;
  }
  .vine-edge::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(to bottom, rgba(90,128,56,0.15), transparent);
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 30px 24px 0;
  }

  /* --- TITLE AREA --- */
  .title-wrap {
    text-align: center;
    margin-bottom: 10px;
    padding-top: 8px;
    position: relative;
  }
  .corner-fl, .corner-fr {
    position: absolute;
    top: 0;
    width: 105px;
    height: auto;
    opacity: 0.22;
    pointer-events: none;
    filter: drop-shadow(0 0 6px rgba(138,112,48,0.15));
  }
  .corner-fl { left: -4px; }
  .corner-fr { right: -4px; }
  .title-sigil {
    display: block; margin: 0 auto 8px;
    width: 60px; height: auto;
    filter: drop-shadow(0 0 8px rgba(140,192,122,0.4));
    animation: sigilGlow 5s ease-in-out infinite;
  }
  .title-art {
    display: block; margin: 0 auto 8px;
    max-width: 520px; width: 90%; height: auto;
    animation: titleArtGlow 5s ease-in-out infinite;
  }
  .sub {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    color: var(--text-subtitle);
    text-transform: uppercase;
    margin-top: 2px;
  }
  .inscription {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--text-inscription);
    margin-top: 4px;
    letter-spacing: 0.04em;
  }
  .title-rule {
    width: 180px; height: 1px;
    margin: 14px auto 0;
    background: linear-gradient(90deg, transparent, rgba(140,192,122,0.3), transparent);
  }

  /* --- TEXT NAV — manuscript-style links --- */
  .text-nav {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    margin: 22px auto 6px;
    max-width: 760px;
    padding: 0 12px;
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .text-nav a {
    color: var(--text-subtitle);
    text-decoration: none;
    border: none;
    padding: 4px 2px;
    transition: color 0.25s ease, text-shadow 0.25s ease;
  }
  .text-nav a:hover {
    color: var(--hearth-text);
    text-shadow: 0 0 12px rgba(212,176,96,0.35);
  }
  .text-nav a.current {
    color: var(--hearth-text);
    text-shadow: 0 0 10px rgba(212,176,96,0.3);
    cursor: default;
    pointer-events: none;
  }
  .text-nav .sep {
    color: rgba(138,112,48,0.4);
    font-size: 0.65rem;
    user-select: none;
    font-family: 'Cinzel Decorative', serif;
  }

  /* --- FLOURISH --- */
  .flourish {
    text-align: center;
    font-family: 'Cinzel Decorative', serif;
    color: var(--text-muted);
    font-size: 0.85rem;
    letter-spacing: 10px;
    margin: 18px 0 20px;
    opacity: 0.55;
  }

  /* --- PAGE HEADING (used by Home, Hub, etc.) --- */
  .page-heading { text-align: center; margin: 24px 0 16px; }
  .page-heading h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--hearth-text);
    text-shadow: 0 0 16px rgba(212,176,96,0.25);
  }
  .page-heading .page-sub {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-inscription);
    margin-top: 4px;
  }
  .vine-divider { text-align: center; margin: 16px 0; }
  .vine-divider img { width: 80%; max-width: 700px; height: auto; opacity: 0.7; }

  /* --- BREADCRUMB (sub-pages) --- */
  .breadcrumb {
    text-align: center;
    margin: 0 0 14px;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .breadcrumb a {
    color: var(--evenstar-text);
    border: none;
    text-decoration: none;
  }
  .breadcrumb a:hover { color: var(--text-bright); }

  /* --- GRID --- */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 22px;
    margin-bottom: 40px;
  }
  .full-width { grid-column: 1 / -1; }

  /* --- SECTION INDICATOR --- */
  .section-indicator {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 18px 0 4px;
    padding: 0 4px;
  }
  .section-indicator img { width: 38px; height: auto; flex-shrink: 0; opacity: 0.95; }
  .section-indicator img.candle-img {
    animation: candleFlicker 3s ease-in-out infinite;
    filter: drop-shadow(0 0 8px rgba(212,176,96,0.3));
  }
  .section-title {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-section);
    white-space: nowrap;
  }
  .section-line {
    flex: 1; height: 1px;
    background: linear-gradient(to right, rgba(138,112,48,0.45), transparent);
  }

  /* --- CARD SYSTEM --- */
  .card {
    position: relative;
    background: var(--card-bg);
    border: 1px solid rgba(74,122,58,0.25);
    border-radius: 2px;
    padding: 0;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    text-decoration: none;
    color: inherit;
  }
  a.card { display: block; }
  a.card:hover { transform: translateY(-2px); box-shadow: 0 4px 28px rgba(0,0,0,0.45); }

  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    border-style: solid;
    opacity: 0.65;
    pointer-events: none;
  }
  .card::before { top: -1px; left: -1px;     border-width: 2px 0 0 2px; }
  .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .card-header { position: relative; padding: 14px 18px 8px; }
  .card-header h2 {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin: 0;
    line-height: 1.3;
  }
  .card-header .line { margin-top: 8px; height: 14px; position: relative; }
  .card-header .line::before {
    content: '';
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
    background-position: center;
    background-size: 100% 100%;
    opacity: 0.55;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 14' preserveAspectRatio='none'><path d='M5,7 Q40,1 75,7 Q110,13 145,7 Q150,5 155,7 Q190,13 225,7 Q260,1 295,7' fill='none' stroke='%238a7a55' stroke-width='1' opacity='0.8'/><circle cx='150' cy='7' r='2' fill='%238a7a55' opacity='0.7'/><circle cx='5' cy='7' r='1.5' fill='%238a7a55' opacity='0.6'/><circle cx='295' cy='7' r='1.5' fill='%238a7a55' opacity='0.6'/><path d='M70,5 Q73,1 76,4' fill='none' stroke='%235a8038' stroke-width='0.7' opacity='0.5'/><path d='M224,9 Q227,13 230,8' fill='none' stroke='%235a8038' stroke-width='0.7' opacity='0.5'/></svg>");
  }

  .card-body {
    position: relative;
    padding: 12px 18px 18px;
    color: var(--text);
    font-size: 0.97rem;
    z-index: 1;
  }
  .card-body::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    background:
      repeating-linear-gradient(0deg,
        transparent, transparent 3px,
        rgba(160,140,100,0.012) 3px, rgba(160,140,100,0.012) 4px
      ),
      radial-gradient(ellipse at 20% 50%, rgba(160,140,100,0.03), transparent 70%),
      radial-gradient(ellipse at 80% 30%, rgba(120,100,60,0.025), transparent 60%);
  }
  .card-body p { margin-bottom: 10px; }
  .card-body p:last-child { margin-bottom: 0; }
  .card-body ul, .card-body ol { margin: 6px 0 12px 22px; }
  .card-body li { margin-bottom: 6px; line-height: 1.5; }
  .card-body ul li::marker { color: #5a8038; }
  .card-body ol li::marker { color: var(--hearth-text); font-family: 'Cinzel', serif; }

  /* --- REALM COLORS --- */
  .c-shire    { border-color: rgba(74,122,58,0.35); }
  .c-shire::before, .c-shire::after       { border-color: var(--shire-text); }
  .c-shire .card-header h2                { color: var(--shire-text); }

  .c-hearth   { border-color: rgba(138,112,48,0.35); }
  .c-hearth::before, .c-hearth::after     { border-color: var(--hearth-text); }
  .c-hearth .card-header h2               { color: var(--hearth-text); }

  .c-evenstar { border-color: rgba(74,120,120,0.35); }
  .c-evenstar::before, .c-evenstar::after { border-color: var(--evenstar-text); }
  .c-evenstar .card-header h2             { color: var(--evenstar-text); }

  .c-earthen  { border-color: rgba(122,90,48,0.35); }
  .c-earthen::before, .c-earthen::after   { border-color: var(--earthen-text); }
  .c-earthen .card-header h2              { color: var(--earthen-text); }

  .c-shadow   { border-color: rgba(106,48,40,0.4); }
  .c-shadow::before, .c-shadow::after     { border-color: var(--shadow-text); }
  .c-shadow .card-header h2               { color: var(--shadow-text); }

  .c-twilight { border-color: rgba(90,74,112,0.4); }
  .c-twilight::before, .c-twilight::after { border-color: var(--twilight-text); }
  .c-twilight .card-header h2             { color: var(--twilight-text); }

  /* --- TEXT HELPERS --- */
  .bold     { color: var(--text-bright); font-weight: 700; }
  .italic   { color: var(--text-muted); font-style: italic; }
  .subheading {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--hearth-text);
    margin: 10px 0 8px;
  }
  .divider {
    border: none; height: 1px;
    background: linear-gradient(to right, transparent, rgba(138,112,48,0.4), transparent);
    margin: 14px 0;
  }

  /* --- LABELS --- */
  .label {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 0.65rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 2px 0;
  }
  .label-shire    { color: var(--shire-text); }
  .label-hearth   { color: var(--hearth-text); }
  .label-evenstar { color: var(--evenstar-text); }
  .label-earthen  { color: var(--earthen-text); }
  .label-shadow   { color: var(--shadow-text); }
  .label-twilight { color: var(--twilight-text); }

  /* --- CALLOUTS --- */
  .callout {
    margin: 10px 0;
    padding: 10px 14px;
    border-left: 3px solid;
    border-radius: 0 2px 2px 0;
    font-size: 0.95rem;
  }
  .callout-shire    { border-left-color: var(--shire-text);    background: rgba(74,122,58,0.06); }
  .callout-hearth   { border-left-color: var(--hearth-text);   background: rgba(138,112,48,0.06); }
  .callout-evenstar { border-left-color: var(--evenstar-text); background: rgba(74,120,120,0.06); }
  .callout-earthen  { border-left-color: var(--earthen-text);  background: rgba(122,90,48,0.06); }
  .callout-shadow   { border-left-color: var(--shadow-text);   background: rgba(106,48,40,0.07); }
  .callout-twilight { border-left-color: var(--twilight-text); background: rgba(90,74,112,0.07); }

  /* --- MACRO CHIPS --- */
  .macro-chip {
    display: inline-block;
    margin: 6px 0;
    padding: 5px 12px;
    border: 1px solid rgba(168,152,192,0.3);
    border-radius: 2px;
    background: rgba(90,74,112,0.06);
    color: var(--twilight-text);
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .macro-shire    { color: var(--shire-text);    border-color: rgba(140,192,122,0.3); background: rgba(74,122,58,0.06); }
  .macro-hearth   { color: var(--hearth-text);   border-color: rgba(212,176,96,0.3);  background: rgba(138,112,48,0.06); }
  .macro-evenstar { color: var(--evenstar-text); border-color: rgba(128,184,176,0.3); background: rgba(74,120,120,0.06); }
  .macro-earthen  { color: var(--earthen-text);  border-color: rgba(200,160,104,0.3); background: rgba(122,90,48,0.06); }
  .macro-shadow   { color: var(--shadow-text);   border-color: rgba(192,112,96,0.3);  background: rgba(106,48,40,0.06); }
  .macro-twilight { color: var(--twilight-text); border-color: rgba(168,152,192,0.3); background: rgba(90,74,112,0.06); }

  /* --- INSET BOX --- */
  .inset-box {
    margin: 10px 0;
    padding: 12px 14px;
    border: 1px dashed rgba(138,112,48,0.3);
    background: rgba(160,140,100,0.03);
    border-radius: 2px;
  }
  .inset-box p { margin-bottom: 6px; }
  .inset-box p:last-child { margin-bottom: 0; }
  .inset-box .bold {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--hearth-text);
  }

  /* --- FOOTER --- */
  .footer-pano {
    position: relative;
    margin: 50px -24px 0;
    padding-top: 20px;
    width: calc(100% + 48px);
    height: 280px;
    overflow: hidden;
  }
  .footer-pano img {
    display: block;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center bottom;
  }
  .footer-pano::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 45%;
    background: linear-gradient(to bottom,
      #121a0e 0%, #121a0e 20%,
      rgba(18,26,14,0.7) 50%,
      rgba(18,26,14,0) 100%);
    z-index: 2;
    pointer-events: none;
  }
  .footer-pano::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right, #121a0e 0%, transparent 8%, transparent 92%, #121a0e 100%),
      linear-gradient(to top, #121a0e 0%, transparent 15%);
    z-index: 2;
    pointer-events: none;
  }
  .footer-text {
    text-align: center;
    padding: 16px 24px 30px;
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: rgba(160,180,130,0.5);
    letter-spacing: 0.5px;
  }
  .footer-meta {
    text-align: center;
    padding-bottom: 24px;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(160,180,130,0.25);
  }
  .footer-meta a { color: inherit; border: none; }
  .footer-meta a:hover { color: rgba(160,180,130,0.5); }

  /* --- ANIMATIONS --- */
  @keyframes sigilGlow {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(140,192,122,0.3)); }
    50%      { filter: drop-shadow(0 0 14px rgba(140,192,122,0.6)) drop-shadow(0 0 30px rgba(140,192,122,0.2)); }
  }
  @keyframes titleArtGlow {
    0%, 100% { filter: drop-shadow(0 0 12px rgba(212,176,96,0.25)) drop-shadow(0 0 30px rgba(140,192,122,0.1)); }
    50%      { filter: drop-shadow(0 0 20px rgba(212,176,96,0.45)) drop-shadow(0 0 50px rgba(140,192,122,0.2)); }
  }
  @keyframes candleFlicker {
    0%, 100% { filter: drop-shadow(0 0 4px rgba(212,176,96,0.3)); }
    25%      { filter: drop-shadow(0 0 10px rgba(212,176,96,0.5)) drop-shadow(0 0 20px rgba(200,140,40,0.2)); }
    50%      { filter: drop-shadow(0 0 6px rgba(212,176,96,0.35)); }
    75%      { filter: drop-shadow(0 0 12px rgba(212,176,96,0.55)) drop-shadow(0 0 25px rgba(200,140,40,0.25)); }
  }

  /* --- MOBILE --- */
  @media (max-width: 720px) {
    .container { padding: 20px 14px 0; }
    .corner-fl, .corner-fr { display: none; }
    .title-sigil { width: 48px; }
    .sub { font-size: 0.65rem; letter-spacing: 3px; }
    .inscription { font-size: 0.85rem; }
    .text-nav { font-size: 0.68rem; gap: 8px; letter-spacing: 0.16em; }
    .text-nav .sep { font-size: 0.55rem; }
    .grid { grid-template-columns: 1fr; gap: 16px; }
    .full-width { grid-column: 1; }
    .section-title { font-size: 0.8rem; letter-spacing: 2.5px; }
    .footer-pano { height: 180px; margin: 40px -14px 0; width: calc(100% + 28px); }
    .page-heading h1 { font-size: 1.25rem; }
  }
</style>
</head>
<body>

<canvas id="fireflies"></canvas>
<div class="vine-edge"></div>

<div class="container">

  <!-- TITLE -->
  <div class="title-wrap">
    <img class="corner-fl" src="https://i.imgur.com/rnnAXuv.png" alt="">
    <img class="corner-fr" src="https://i.imgur.com/zbG7R47.png" alt="">
    <img class="title-sigil" src="https://i.imgur.com/Sz7FZ5y.png" alt="Leaf of Lórien">
    <img class="title-art" src="https://i.imgur.com/FQnG6gJ.png" alt="The Fellowship of the Fix">
    <div class="sub">Operations Support — Tutor Team</div>
    <div class="inscription">— one team to find them, one team to help them all —</div>
    <div class="title-rule"></div>
  </div>

  <!-- NAV -->
  <nav class="text-nav">
    <? for (var i = 0; i < navItems.length; i++) { var item = navItems[i]; ?>
      <? if (i > 0) { ?><span class="sep">&#10086;</span><? } ?>
      <? if (item.isCurrent) { ?>
        <a class="current"><?= item.label ?></a>
      <? } else { ?>
        <a href="<?= item.url ?>"><?= item.label ?></a>
      <? } ?>
    <? } ?>
  </nav>

  <div class="flourish">&#10045; &bull; &#10045; &bull; &#10045;</div>

  <!-- PAGE-SPECIFIC CONTENT -->
  <?!= bodyContent ?>

  <!-- FOOTER -->
  <div class="footer-pano">
    <img src="https://i.imgur.com/4AKcRoA.gif" alt="The Shire">
  </div>
  <div class="footer-text">In a hole in the ground there lived a hobbit — and from that hole, a fellowship was forged.</div>
  <? if (showRefresh) { ?>
    <div class="footer-meta"><a href="<?= refreshUrl ?>">Refresh from doc</a></div>
  <? } ?>

</div>

<script>
  // --- FIREFLY ANIMATION ---
  // Canvas stays at viewport size (no stretching on long pages).
  // Particles live in page coordinate space; we translate by scrollY when drawing.
  (function() {
    var canvas = document.getElementById('fireflies');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var fireflies = [];
    var COUNT = 35;
    var W, H, pageH;

    function getPageH() {
      return Math.max(document.documentElement.scrollHeight, window.innerHeight);
    }
    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      pageH = getPageH();
    }
    resize();
    window.addEventListener('resize', resize);
    // Re-measure page height periodically (images load, content shifts, etc.)
    setInterval(function() { pageH = getPageH(); }, 2000);

    for (var i = 0; i < COUNT; i++) {
      fireflies.push({
        x: Math.random() * W,
        y: Math.random() * pageH,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        radius: 1.5 + Math.random() * 1.5,
        phase: Math.random() * Math.PI * 2,
        speed: 0.008 + Math.random() * 0.012
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      var scrollY = window.scrollY || window.pageYOffset || 0;

      for (var i = 0; i < fireflies.length; i++) {
        var f = fireflies[i];
        f.phase += f.speed;
        var alpha = 0.25 + Math.abs(Math.sin(f.phase)) * 0.55;

        f.x += f.vx;
        f.y += f.vy;
        // Gentle wander
        f.vx += (Math.random() - 0.5) * 0.02;
        f.vy += (Math.random() - 0.5) * 0.02;
        f.vx = Math.max(-0.5, Math.min(0.5, f.vx));
        f.vy = Math.max(-0.5, Math.min(0.5, f.vy));
        // Wrap across page coords
        if (f.x < -20) f.x = W + 20;
        if (f.x > W + 20) f.x = -20;
        if (f.y < -20) f.y = pageH + 20;
        if (f.y > pageH + 20) f.y = -20;

        // Translate to screen coords
        var screenY = f.y - scrollY;
        if (screenY < -30 || screenY > H + 30) continue;

        // Outer warm halo
        var grad = ctx.createRadialGradient(f.x, screenY, 0, f.x, screenY, f.radius * 10);
        grad.addColorStop(0,   'rgba(212, 190, 110, ' + (alpha * 0.32) + ')');
        grad.addColorStop(0.4, 'rgba(200, 170, 80, '  + (alpha * 0.12) + ')');
        grad.addColorStop(1,   'rgba(180, 160, 80, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(f.x, screenY, f.radius * 10, 0, Math.PI * 2);
        ctx.fill();

        // Bright core
        ctx.fillStyle = 'rgba(240, 220, 150, ' + alpha + ')';
        ctx.beginPath();
        ctx.arc(f.x, screenY, f.radius, 0, Math.PI * 2);
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }
    draw();
  })();
</script>
